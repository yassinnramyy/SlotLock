spring:
  application:
    name: slotlock

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/slotlock?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:slotlock}
    password: ${DB_PASSWORD:slotlock}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:slotlock}
    password: ${RABBITMQ_PASSWORD:slotlock}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-only-insecure-default-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8080
